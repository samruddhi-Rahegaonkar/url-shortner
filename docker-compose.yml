services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: urlshortner

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .

    ports:
      - "8080:8080"

    environment:
      DATABASE_URL: postgres://postgres:root@postgres:5432/urlshortner?sslmode=disable

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: